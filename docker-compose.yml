version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: job_agent_postgres
    environment:
      POSTGRES_USER: job_agent
      POSTGRES_PASSWORD: job_agent
      POSTGRES_DB: job_agent
    ports:
      - "5433:5432"
    volumes:
      - job_agent_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: job_agent_redis
    ports:
      - "6379:6379"

volumes:
  job_agent_pgdata:
