name: Security Audit

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit
      - name: Run Bandit
        run: bandit -r backend/app -f json -o bandit_report.json
      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt -f json -o pip_audit_report.json
      - name: Upload backend security reports
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            bandit_report.json
            pip_audit_report.json

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high --json > ../frontend_npm_audit.json
      - name: Upload frontend security report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-report
          path: frontend_npm_audit.json
